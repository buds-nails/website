name: Deploy Website to S3 + CloudFront

on:
  push:
    branches: [main]

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      # NOTE: bucket name is deliberately `budsnail.co.uk` (no 's') — that's
      # how the bucket was originally created and is what CloudFront reads from.
      # The public domain is `budsnails.co.uk` (with 's'). Do not "fix" this.
      - name: Sync website to S3
        run: |
          aws s3 sync public/ s3://budsnail.co.uk/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".DS_Store" \
            --exclude "*.md" \
            --exclude "*.sh"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3CNIYS8ATC7LZ \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Website deployed to S3 bucket: budsnail.co.uk (CF origin)"
          echo "CloudFront distribution E3CNIYS8ATC7LZ cache invalidated"
          echo "Live at: https://www.budsnails.co.uk"
